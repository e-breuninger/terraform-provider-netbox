---
services:
  postgres:
    image: postgres:18-alpine
    environment:
      - POSTGRES_USER=netbox
      - POSTGRES_PASSWORD=netbox
      - POSTGRES_DB=netbox
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -q -t 2 -d $$POSTGRES_DB -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
  redis:
    image: docker.io/valkey/valkey:9.0-alpine
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
  netbox:
    image: netboxcommunity/netbox:${NETBOX_VERSION}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - 8001:8080
    environment:
      - CORS_ORIGIN_ALLOW_ALL=True
      - DB_NAME=netbox
      - DB_USER=netbox
      - DB_PASSWORD=netbox
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - REDIS_DATABASE=0
      - REDIS_SSL=false
      - REDIS_CACHE_HOST=redis
      - REDIS_CACHE_DATABASE=1
      - REDIS_CACHE_SSL=false
      - SECRET_KEY=0123456789abcdefghij0123456789abcdefghij0123456789
      - SKIP_STARTUP_SCRIPTS=false
      - SKIP_SUPERUSER=false
      - SUPERUSER_NAME=admin
      - SUPERUSER_EMAIL=admin@example.com
      - SUPERUSER_PASSWORD=admin
      - SUPERUSER_API_TOKEN=${SUPERUSER_API_TOKEN}
      - SUPERUSER_API_KEY=${SUPERUSER_API_KEY}
      - API_TOKEN_PEPPER_1=${API_TOKEN_PEPPER_1}
      - METRICS_ENABLED=true
      - GRANIAN_BACKPRESSURE=100
    # Gate on a real readiness signal: /login/ only serves 200 once migrations
    # have run and the app is up (matches netbox-community/netbox-docker). The
    # previous /metrics check went green before Netbox was actually ready,
    # racing the acceptance tests.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/login/"]
      interval: 15s
      timeout: 5s
      # Generous headroom: migrations on a cold/slow CI runner can take well
      # over a minute. A successful check during start_period still marks the
      # container healthy immediately, so a large value never delays readiness
      # detection -- it only widens the grace window before giving up.
      # start_period (180s) + retries*interval (20*15s) => up to ~8min tolerance.
      retries: 20
      start_period: 180s
