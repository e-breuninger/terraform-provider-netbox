---
name: ci-testing
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: test
        run: make test

  testacc:
    runs-on: ubuntu-22.04
    env:
      # Split each Netbox version's acceptance suite across this many parallel
      # jobs, each with its own Netbox. Cuts wall-clock without raising the
      # per-Netbox concurrency (which is what causes test-isolation flakiness).
      SHARD_TOTAL: "4"
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
        netbox-version:
          - v4.3.0
          # - v4.3.1 # with this version, we get {"scope":["Please select a site."]} for prefixes
          - v4.3.2
          - v4.3.3
          - v4.3.4
          - v4.3.5
          - v4.3.6
          - v4.3.7
          - v4.4.0
          - v4.4.1
          - v4.4.2
          # - v4.4.3 # this version cannot be spun up for testing due to TypeError: issubclass() arg 1 must be a class
          - v4.4.4
          - v4.4.5
          - v4.4.6
          - v4.4.7
          - v4.4.8
          - v4.4.9
          - v4.4.10
          # - v4.5.0 # this version cannot be spun up for testing due to startup stall at "Building search index"
          - v4.5.1
          - v4.5.2
          - v4.5.3
          - v4.5.4
          - v4.5.5
          - v4.5.6
          - v4.5.7
          - v4.5.8
          - v4.5.9
          - v4.5.10
          - v4.6.0
          - v4.6.1
          - v4.6.2
          - v4.6.3
    steps:
      - uses: actions/checkout@v7
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Compute test shard
        id: shard
        # List every test, keep this shard's slice (round-robin by index), and
        # build an anchored -run regexp for it. Round-robin spreads related
        # tests across shards so each shard stays well balanced.
        run: |
          mapfile -t tests < <(go test ./netbox/ -list 'Test.*' | grep -E '^Test' | sort)
          selected=()
          for i in "${!tests[@]}"; do
            if [ $(( i % SHARD_TOTAL )) -eq $(( ${{ matrix.shard }} - 1 )) ]; then
              selected+=("${tests[$i]}")
            fi
          done
          IFS='|'; regex="^(${selected[*]})\$"; unset IFS
          echo "Shard ${{ matrix.shard }}/${SHARD_TOTAL}: ${#selected[@]} of ${#tests[@]} tests"
          echo "run=${regex}" >> "$GITHUB_OUTPUT"
      - name: testacc
        # Retry once on failure. Netbox itself is occasionally flaky at startup
        # or hits transient server-side bugs on a specific patch version; a
        # single retry (with a clean teardown in between) clears those without
        # masking real, reproducible failures.
        run: |
          for attempt in 1 2; do
            echo "::group::testacc attempt $attempt (Netbox ${NETBOX_VERSION}, shard ${{ matrix.shard }}/${SHARD_TOTAL})"
            if make -e testacc; then exit 0; fi
            echo "::endgroup::"
            echo "::warning::testacc attempt $attempt failed on ${NETBOX_VERSION} shard ${{ matrix.shard }}; tearing down and retrying"
            make docker-down || true
          done
          exit 1
        env:
          NETBOX_VERSION: ${{ matrix.netbox-version }}
          TESTACC_RUN: ${{ steps.shard.outputs.run }}
